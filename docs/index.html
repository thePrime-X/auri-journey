<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Auri's Journey — UI v3</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#070B14;--bg2:#0D1424;--bg3:#111827;--bg4:#162032;--bg5:#1A2740;
  --cyan:#00D4FF;--cyan2:#0891B2;--cyan-g:rgba(0,212,255,.12);--cyan-b:rgba(0,212,255,.25);
  --purple:#7C5EFF;--purple2:#5B3FCC;--purple-g:rgba(124,94,255,.12);--purple-b:rgba(124,94,255,.28);
  --green:#10B981;--green2:#059669;--green-g:rgba(16,185,129,.12);
  --amber:#F59E0B;--amber-g:rgba(245,158,11,.12);--amber-b:rgba(245,158,11,.28);
  --red:#EF4444;--red2:#DC2626;--red-g:rgba(239,68,68,.12);--red-b:rgba(239,68,68,.28);
  --t1:#E8EAE6;--t2:#94A3B8;--t3:#546070;--t4:#2D3A4A;
  --bdr:#1A2535;--bdr2:#243044;
  --r8:8px;--r12:12px;--r16:16px;--r24:24px
}
body{background:#04060D;font-family:'Exo 2',sans-serif;min-height:100vh;padding:28px 16px 48px;display:flex;flex-direction:column;align-items:center}
#app-title{font-family:'Orbitron',monospace;color:var(--cyan);font-size:20px;letter-spacing:3px;margin-bottom:4px}
#app-sub{font-size:11px;color:var(--t3);letter-spacing:1.5px;margin-bottom:24px}
.nav-strip{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:28px;max-width:900px}
.tab{padding:6px 13px;border-radius:6px;border:1px solid var(--bdr2);background:var(--bg2);color:var(--t3);font-family:'Exo 2',sans-serif;font-size:11px;font-weight:600;cursor:pointer;letter-spacing:.4px;transition:all .15s}
.tab:hover{border-color:var(--cyan);color:var(--cyan)}
.tab.on{background:var(--cyan);color:#04060D;border-color:var(--cyan)}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(278px,1fr));gap:28px;width:100%;max-width:1360px}
.phone-wrap{display:flex;flex-direction:column;align-items:center;gap:10px}
.phone{width:278px;height:598px;background:var(--bg);border-radius:34px;border:1.5px solid var(--bdr2);overflow:hidden;position:relative;box-shadow:0 0 0 1px #090E18,0 28px 70px rgba(0,0,0,.7)}
.pinner{height:100%;overflow:hidden;position:relative}
.sc{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;scrollbar-width:none}
.sc::-webkit-scrollbar{display:none}
.plabel{font-family:'Orbitron',monospace;font-size:10px;color:var(--t4);letter-spacing:1px;text-align:center}

/* ── NAV BAR ── */
.bnav{display:flex;border-top:1px solid var(--bdr);background:var(--bg2);padding:7px 0 5px;flex-shrink:0}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.ni svg{width:19px;height:19px;stroke:var(--t3);fill:none;stroke-width:1.8}
.ni span{font-size:9px;color:var(--t3);letter-spacing:.4px;font-weight:600;text-transform:uppercase}
.ni.on svg{stroke:var(--cyan)}
.ni.on span{color:var(--cyan)}

/* ── COMMON ── */
.hdr{padding:14px 16px 0;display:flex;align-items:center;justify-content:space-between}
.xpbadge{display:flex;align-items:center;gap:4px;font-family:'Orbitron',monospace;font-size:11px;color:var(--amber);font-weight:700}
.card{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r16)}
.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:.4px}
.tc{background:var(--cyan-g);color:var(--cyan);border:1px solid var(--cyan-b)}
.tp{background:var(--purple-g);color:var(--purple);border:1px solid var(--purple-b)}
.ta{background:var(--amber-g);color:var(--amber);border:1px solid var(--amber-b)}
.tg{background:var(--green-g);color:var(--green);border:1px solid rgba(16,185,129,.28)}
.tr{background:var(--red-g);color:var(--red);border:1px solid var(--red-b)}
.ts{background:rgba(84,96,112,.12);color:var(--t3);border:1px solid var(--bdr)}
.xpbar-wrap{margin:0 16px}
.xpbar-lbl{display:flex;justify-content:space-between;font-size:10px;color:var(--t3);margin-bottom:5px;letter-spacing:.4px}
.xpbar-track{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.xpbar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--cyan),var(--purple))}
.btn-p{width:100%;padding:13px;border-radius:var(--r12);background:linear-gradient(135deg,var(--cyan),var(--cyan2));color:#04060D;font-family:'Exo 2',sans-serif;font-size:14px;font-weight:800;border:none;cursor:pointer;letter-spacing:.4px}
.btn-pu{background:linear-gradient(135deg,var(--purple),var(--purple2));color:#E8EAE6}
.btn-s{background:transparent;color:var(--t2);border:1.5px solid var(--bdr2)}
.btn-dead{background:transparent;color:var(--t4);border:1px solid var(--bdr);opacity:.55}

/* ── AUTH ── */
.auth-shell{flex:1;display:flex;flex-direction:column;align-items:center;padding:20px 20px 16px;position:relative;overflow:hidden}
.auth-shell::before{content:'';position:absolute;top:-40px;left:50%;transform:translateX(-50%);width:220px;height:220px;background:radial-gradient(circle,rgba(0,212,255,.05) 0%,transparent 70%);pointer-events:none}
.logo-box{width:80px;height:80px;background:radial-gradient(circle at 38% 32%,#0A3D5C,#030C18);border-radius:18px;border:1.5px solid rgba(0,212,255,.28);display:flex;align-items:center;justify-content:center;margin-bottom:8px;position:relative;flex-shrink:0}
.logo-box::after{content:'';position:absolute;inset:-5px;border-radius:22px;border:1px solid rgba(0,212,255,.07)}
.logo-box-p{background:radial-gradient(circle at 38% 32%,#1A0A4A,#06030F);border-color:rgba(124,94,255,.3)}
.logo-box-p::after{border-color:rgba(124,94,255,.07)}
.app-name{font-family:'Orbitron',monospace;font-size:11px;color:var(--t3);letter-spacing:2px;margin-bottom:16px}
.af{width:100%;flex:1;display:flex;flex-direction:column}
.at{font-size:24px;font-weight:700;color:var(--t1);margin-bottom:2px}
.as{font-size:12px;color:var(--t2);margin-bottom:18px}
.kicker{font-size:9px;color:var(--t3);letter-spacing:1.5px;margin-bottom:3px}
.iw{position:relative;margin-bottom:11px}
.ii{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--t3);fill:none;stroke-width:1.8}
.ifield{width:100%;padding:12px 13px 12px 40px;background:var(--bg3);border:1.5px solid var(--bdr2);border-radius:var(--r12);color:var(--t1);font-family:'Exo 2',sans-serif;font-size:13px;outline:none;transition:border-color .2s,box-shadow .2s}
.ifield::placeholder{color:#3A5068}
.ifield:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,212,255,.1)}
.ifield.err{border-color:var(--red);box-shadow:0 0 0 3px var(--red-g)}
.forgot{text-align:right;margin:-4px 0 14px}
.forgot a{font-size:12px;color:var(--cyan);text-decoration:none;font-weight:600;opacity:.8}
.auth-alt{text-align:center;margin-top:12px;font-size:12px;color:var(--t3)}
.auth-alt a{color:var(--cyan);font-weight:700;text-decoration:none}
.auth-alt a.pa{color:var(--purple)}

/* ── MISSION ── */
.mc{display:flex;align-items:center;gap:10px;padding:11px 13px;margin:0 14px 7px;background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r12);cursor:pointer}
.mc.act{border-color:var(--purple);background:linear-gradient(135deg,rgba(124,94,255,.1),rgba(92,63,204,.06));box-shadow:0 0 0 1px rgba(124,94,255,.15),0 4px 20px rgba(124,94,255,.12)}
.mc.done{border-color:rgba(16,185,129,.22);background:rgba(16,185,129,.03)}
.mc.locked{opacity:.22}
.mbar{width:3px;height:38px;border-radius:2px;background:var(--bdr2);flex-shrink:0}
.mbar.d{background:var(--green)}
.mbar.a{background:var(--purple)}
.mt{font-size:13px;font-weight:700;color:var(--t1);margin-bottom:1px}
.ms{font-size:11px;color:var(--t2);margin-bottom:4px}
.mt.g{color:var(--t3)}
.ms.g{color:var(--t4)}

/* ── GAME ── */
.ghdr{padding:12px 16px 8px}
.ghdr-r1{display:flex;align-items:center;gap:10px;margin-bottom:3px}
.ghdr-r2{display:flex;align-items:center;gap:0;padding-left:40px}
.back{width:30px;height:30px;border-radius:var(--r8);background:var(--bg3);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.back svg{width:14px;height:14px;stroke:var(--t2);fill:none;stroke-width:2.2}
.stitle{font-family:'Orbitron',monospace;font-size:13px;color:var(--t1);flex:1;letter-spacing:.5px}
.msub{font-size:10px;color:var(--t3)}
.grid-section{padding:0 14px;margin-bottom:9px}
.grid-lbl{font-size:8px;color:var(--t3);letter-spacing:2px;text-align:center;margin-bottom:7px}
.egrid{display:grid;grid-template-columns:repeat(5,1fr);gap:3px}
.cell{aspect-ratio:1;background:var(--bg3);border:1px solid var(--bdr);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:13px}
.cell.rob{background:rgba(0,212,255,.06);border-color:rgba(0,212,255,.22)}
.cell.tgt{background:rgba(245,158,11,.06);border-color:rgba(245,158,11,.22)}
.cell.haz{background:rgba(239,68,68,.06);border-color:rgba(239,68,68,.2)}
.cmds{padding:0 14px;margin-bottom:9px}
.clbl{font-size:9px;color:var(--cyan);font-weight:700;letter-spacing:1.2px;margin-bottom:7px}
.crow{display:flex;gap:5px;flex-wrap:wrap}
.chip{padding:6px 10px;border-radius:7px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid transparent;white-space:nowrap;letter-spacing:.2px}
.ch-c{background:var(--cyan-g);color:var(--cyan);border-color:var(--cyan-b)}
.ch-p{background:var(--purple-g);color:var(--purple);border-color:var(--purple-b)}
.ch-a{background:var(--amber-g);color:var(--amber);border-color:var(--amber-b)}
.ch-g{background:var(--green-g);color:var(--green);border-color:rgba(16,185,129,.28)}
.ch-u{background:transparent;color:var(--t4);border-color:var(--bdr);font-size:9px;opacity:.6;padding:6px 8px}
.qsec{margin:0 14px 9px;background:var(--bg3);border:1px solid var(--bdr2);border-radius:var(--r12);padding:9px 12px}
.qtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.qcount{font-size:10px;color:var(--t2);font-weight:600}
.qclear{font-size:9px;color:var(--t3);background:transparent;border:none;cursor:pointer;font-family:'Exo 2',sans-serif;font-weight:600;opacity:.7}
.qrow{display:flex;gap:5px}
.qi{flex:1;background:var(--bg4);border-radius:6px;border:1px solid var(--bdr);padding:5px;display:flex;flex-direction:column;align-items:center;gap:3px}
.qn{font-size:8px;color:var(--t3);font-weight:700}
.re{display:flex;gap:8px;padding:0 14px;margin-bottom:9px}
.run{flex:2;padding:11px;border-radius:var(--r12);background:linear-gradient(135deg,var(--cyan),var(--cyan2));color:#04060D;font-weight:800;border:none;cursor:pointer;font-family:'Exo 2',sans-serif;font-size:12px;display:flex;align-items:center;justify-content:center;gap:5px}
.exit{flex:1;padding:11px;border-radius:var(--r12);background:transparent;color:var(--t4);font-weight:600;border:1.5px solid var(--bdr);cursor:pointer;font-family:'Exo 2',sans-serif;font-size:11px}
.echo{margin:0 14px 14px;background:var(--bg3);border-left:2.5px solid var(--cyan);border:1px solid var(--bdr2);border-left:2.5px solid var(--cyan);border-radius:var(--r8);padding:9px 12px}
.echt{font-size:8px;color:var(--cyan);font-weight:700;letter-spacing:1.5px;margin-bottom:4px}
.echb{font-size:11px;color:var(--t1);line-height:1.55}

/* ── COMPLETE ── */
.comph{padding:12px 16px;display:flex;justify-content:space-between;align-items:flex-start}
.sring{width:88px;height:88px;border-radius:50%;background:radial-gradient(circle,rgba(16,185,129,.12),transparent 72%);border:1.5px solid rgba(16,185,129,.35);display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.scheck{width:44px;height:44px;border-radius:50%;background:rgba(16,185,129,.15);border:1.5px solid var(--green);display:flex;align-items:center;justify-content:center}
.ctitle{font-family:'Orbitron',monospace;font-size:16px;color:var(--t1);text-align:center;margin-bottom:3px;letter-spacing:.5px}
.csub{font-size:12px;color:var(--t2);text-align:center;margin-bottom:10px}
.xpr{display:inline-flex;align-items:center;gap:5px;background:var(--amber-g);border:1px solid var(--amber-b);padding:5px 14px;border-radius:20px;font-size:13px;font-weight:700;color:var(--amber)}
.mcard{display:flex;background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r16);margin:0 14px 12px;overflow:hidden}
.mb{flex:1;padding:12px;text-align:center}
.mdiv{width:1px;background:var(--bdr)}
.mn{font-family:'Orbitron',monospace;font-size:22px;font-weight:700;color:var(--t1);margin-bottom:2px}
.ml{font-size:9px;color:var(--t3);letter-spacing:.5px;margin-bottom:3px}
.mbadge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;display:inline-block}
.bg{background:rgba(16,185,129,.14);color:#34D399}
.bc{background:rgba(0,212,255,.14);color:var(--cyan)}
.conccard{margin:0 14px 12px;background:rgba(0,212,255,.04);border:1px solid rgba(0,212,255,.18);border-radius:var(--r12);padding:11px 13px}
.conclbl{font-size:8px;color:var(--cyan);font-weight:700;letter-spacing:1.5px;margin-bottom:5px}
.conct{font-size:15px;font-weight:700;color:var(--t1);margin-bottom:2px}
.concd{font-size:11px;color:var(--t2);line-height:1.4}

/* ── WORLD MAP ── */
.mapsvg{display:block;margin:0 auto}

/* ── HUB ── */
.hbhdr{padding:12px 16px 10px;display:flex;justify-content:space-between;align-items:flex-start}
.hbtitle{font-family:'Orbitron',monospace;font-size:10px;color:var(--cyan);letter-spacing:1.5px;margin-bottom:2px}
.hbgreet{font-size:15px;font-weight:700;color:var(--t1)}
.chall{margin:0 14px 10px;background:rgba(16,185,129,.05);border:1px solid rgba(16,185,129,.22);border-radius:var(--r16);padding:12px 14px}
.challt{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.challlbl{font-size:8px;font-weight:700;color:var(--green);letter-spacing:1.5px}
.challpill{padding:3px 10px;background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.28);border-radius:10px;font-size:10px;color:var(--green);font-weight:700}
.challname{font-size:15px;font-weight:700;color:var(--t1);margin-bottom:3px}
.challreset{font-size:10px;color:var(--t3)}
.goplay{margin:0 14px 12px;padding:13px;border-radius:var(--r12);background:linear-gradient(135deg,var(--cyan),var(--cyan2));color:#04060D;font-family:'Exo 2',sans-serif;font-size:14px;font-weight:800;border:none;cursor:pointer;width:calc(100% - 28px);letter-spacing:.4px}
.echohub{margin:0 14px 10px;background:var(--bg3);border:1px solid var(--bdr2);border-left:2.5px solid var(--purple);border-radius:var(--r8);padding:9px 12px}
.echohublbl{font-size:8px;color:var(--purple);font-weight:700;letter-spacing:1.5px;margin-bottom:4px}
.echohubtext{font-size:11px;color:var(--t1);line-height:1.5}
.stats2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 14px 10px}
.scard{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r8);padding:10px;text-align:center}
.snum{font-family:'Orbitron',monospace;font-size:18px;font-weight:700;margin-bottom:2px}
.slbl{font-size:9px;color:var(--t3);letter-spacing:.4px}
.act-sec{margin:0 14px 10px}
.act-lbl{font-size:9px;color:var(--t3);letter-spacing:1px;font-weight:700;margin-bottom:6px}
.act-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--bdr)}
.act-row:last-child{border:none}
.act-t{font-size:11px;color:var(--t3)}
.act-time{font-size:10px;color:var(--t4)}

/* ── PROFILE ── */
.prohero{padding:16px 16px 10px;display:flex;flex-direction:column;align-items:center}
.avring{width:72px;height:72px;border-radius:50%;background:var(--bg3);border:2px solid var(--purple);display:flex;align-items:center;justify-content:center;margin-bottom:8px;position:relative;flex-shrink:0}
.odot{width:11px;height:11px;border-radius:50%;background:var(--green);border:2px solid var(--bg);position:absolute;bottom:2px;right:2px}
.uname{font-size:13px;font-weight:700;color:var(--t1);margin-bottom:1px}
.urank{font-size:10px;color:var(--purple);font-weight:600;letter-spacing:.5px;margin-bottom:7px}
.lvpill{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;background:var(--amber-g);border:1px solid var(--amber-b);border-radius:20px;font-size:10px;color:var(--amber);font-weight:700}
.prostats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:0 14px 12px}
.psc{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r8);padding:9px;text-align:center}
.psn{font-family:'Orbitron',monospace;font-size:16px;font-weight:700;color:var(--t1);margin-bottom:1px}
.psl{font-size:8px;color:var(--t3);letter-spacing:.4px;line-height:1.3}
.procont{padding:0 14px 14px}
.sectitle{font-size:9px;font-weight:700;color:var(--cyan);letter-spacing:1.5px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.sectitle::after{content:'';flex:1;height:1px;background:var(--bdr)}
.skillrow{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.sknm{font-size:10px;color:var(--t2);width:64px;flex-shrink:0}
.sktrack{flex:1;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.skfill{height:100%;border-radius:3px}
.skpct{font-size:9px;color:var(--t3);width:26px;text-align:right;flex-shrink:0;font-weight:600}

/* ── LOADING STATES ── */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes pulsescale{0%,100%{transform:scale(.96);opacity:.7}50%{transform:scale(1);opacity:1}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.spinner{width:32px;height:32px;border:2.5px solid var(--bdr2);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite}
.spinner-sm{width:18px;height:18px;border:2px solid var(--bdr2);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite}
.pulse-ring{width:64px;height:64px;border-radius:50%;background:rgba(0,212,255,.06);border:2px solid rgba(0,212,255,.25);display:flex;align-items:center;justify-content:center;animation:pulsescale 1.5s ease-in-out infinite}
.skel{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px}
.dots{display:flex;gap:5px;align-items:center}
.dot{width:7px;height:7px;border-radius:50%;background:var(--cyan);animation:blink 1.2s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
.run-anim{width:100%;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;position:relative}
.run-bar{height:100%;width:40%;background:linear-gradient(90deg,transparent,var(--cyan),transparent);animation:shimmer 1.2s linear infinite;background-size:200% 100%}

/* ── ERROR STATES ── */
.err-banner{background:var(--red-g);border:1px solid var(--red-b);border-radius:var(--r8);padding:9px 12px;display:flex;align-items:flex-start;gap:8px;margin:0 0 10px}
.err-icon{width:16px;height:16px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.err-icon span{font-size:9px;color:#fff;font-weight:700}
.err-text{font-size:11px;color:#FCA5A5;line-height:1.45}
.err-field{border-color:var(--red)!important;box-shadow:0 0 0 3px var(--red-g)!important}
.warn-banner{background:var(--amber-g);border:1px solid var(--amber-b);border-radius:var(--r8);padding:9px 12px;display:flex;align-items:flex-start;gap:8px}

/* ── ONBOARDING ── */
.ob-hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.ob-icon{width:80px;height:80px;border-radius:20px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;position:relative}
.ob-icon::before{content:'';position:absolute;inset:-1px;border-radius:21px;border:1px solid rgba(0,212,255,.2)}
.ob-title{font-family:'Orbitron',monospace;font-size:18px;color:var(--t1);text-align:center;margin-bottom:8px;letter-spacing:.5px}
.ob-desc{font-size:13px;color:var(--t2);text-align:center;line-height:1.6;max-width:220px;margin:0 auto}
.ob-dots{display:flex;gap:7px;justify-content:center;margin-top:20px}
.ob-dot{width:7px;height:7px;border-radius:50%;background:var(--bdr2)}
.ob-dot.on{background:var(--cyan);width:22px;border-radius:4px}

.ob-dots3 .ob-dot.on{background:var(--green);width:22px}
.ob-bot{padding:16px;flex-shrink:0}

.feat-row{display:flex;align-items:flex-start;gap:12px;padding:12px;background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r12);margin-bottom:8px}

.feat-d{font-size:11px;color:var(--t2);line-height:1.4}

<body>

<script>

    [`<path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>`,'Game'],

    [`<circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/>`,'World'],
    [`<path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/>`,'Hub'],
  ];
  return `<div class="bnav">${items.map((it,i)=>`<div class="ni${i===a?' on':''}"><svg viewBox="0 0 24 24">${it[0]}</svg><span>${it[1]}</span></div>`).join('')}</div>`;
};

  ${[8,15,22,29].map(x=>`<line x1="${x}" y1="8" x2="${x}" y2="14" stroke="${c2}" stroke-width="1.5"/><line x1="${x}" y1="38" x2="${x}" y2="44" stroke="${c2}" stroke-width="1.5"/>`).join('')}
</svg>`;
const emailIcon = `<path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>`;

/* ─── SCREEN 1: SIGN IN ─── */

const screens = [
  {id:'signin',  label:'01 · Sign In',      fn: S_SignIn},
  {id:'signup',  label:'02 · Sign Up',      fn: S_SignUp},
  {id:'missions',label:'03 · Missions',     fn: S_Missions},
  {id:'game',    label:'04 · Game',         fn: S_Game},
  {id:'complete',label:'05 · Complete',     fn: S_Complete},
  {id:'worldmap',label:'06 · World Map',    fn: S_WorldMap},
  {id:'hub',     label:'07 · Hub',          fn: S_Hub},
  {id:'profile', label:'08 · Profile',      fn: S_Profile},
  {id:'loading', label:'09 · Loading',      fn: S_Loading},
  {id:'errors',  label:'10 · Errors',       fn: S_Errors},
  {id:'onboard', label:'11 · Onboarding',   fn: S_Onboarding},
];

const tabsEl = document.getElementById('tabs');
const gridEl = document.getElementById('grid');

function makePhone(s){
  return `<div class="phone-wrap">
    <div class="phone"><div class="pinner"><div class="sc">${s.fn()}</div></div></div>
    <div class="plabel">${s.label}</div>
  </div>`;
}

function renderAll(){
  gridEl.style.gridTemplateColumns='repeat(auto-fill,minmax(278px,1fr))';
  gridEl.innerHTML = screens.map(makePhone).join('');
}
function renderOne(idx){
  gridEl.style.gridTemplateColumns='1fr';
  gridEl.innerHTML = `<div style="display:flex;justify-content:center">${makePhone(screens[idx])}</div>`;
}

// tabs
const allTab = document.createElement('button');
allTab.className='tab on'; allTab.textContent='All Screens';
allTab.onclick=()=>{document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on')); allTab.classList.add('on'); renderAll();};
tabsEl.appendChild(allTab);

screens.forEach((s,i)=>{
  const t=document.createElement('button');
  t.className='tab'; t.textContent=s.label;
  t.onclick=()=>{document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on')); t.classList.add('on'); renderOne(i);};
  tabsEl.appendChild(t);
});

renderAll();
</script>
